name: Attendo Build & Push Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: samarthlambture/attendo-frontend
  BACKEND_IMAGE_NAME: samarthlambture/attendo-backend

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for pushing back to the repo

      # 2. Login to GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_TOKEN }}

      # 3. Build Frontend Docker Image
      - name: Build Frontend Image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} ./attendo-pwa

      # 4. Build Backend Docker Image
      - name: Build Backend Image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} ./attendo-backend

      # 5. Trivy Scan Frontend (continue-on-error: true)
      - name: Run Trivy vulnerability scanner on Frontend
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 6. Trivy Scan Backend (continue-on-error: true)
      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 7. Push Frontend Image
      - name: Push Frontend Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

      # 8. Push Backend Image
      - name: Push Backend Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

      # 9. Update Kubernetes Manifests
      - name: Update Kubernetes Manifests
        run: |
          # Use sed to replace the image tag with the new Git SHA
          sed -i "s|image: ghcr.io/.*/attendo-frontend:.*|image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}|g" k8s-manifests/frontend-deployment.yml
          sed -i "s|image: ghcr.io/.*/attendo-backend:.*|image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}|g" k8s-manifests/backend-deployment.yml

      # 10 & 11. Commit Updated Image Tags & Push Manifest Changes
      - name: Commit and Push Manifest Changes
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add k8s-manifests/frontend-deployment.yml k8s-manifests/backend-deployment.yml
          git commit -m "chore(k8s): update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin main

      # 12. Send Email Notification
      - name: Send Email Notification
        if: always() # Ensures email is sent whether the job succeeded or failed
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: lambture5522@gmail.com
          password: ${{ secrets.MAIL_PASSWORD }} # App Password from Gmail
          subject: CI Pipeline Run for Attendo - ${{ job.status }}
          body: |
            Build job of ${{github.repository}} completed with status: ${{ job.status }}.
            
            Commit: ${{ github.sha }}
            Pushed by: ${{ github.actor }}
            
            View Action Run: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
          to: lambture5522@gmail.com
          from: Attendo CI/CD

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: attendo-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/SamarthLambture/Smart-Attendance-System.git
    targetRevision: HEAD
    path: k8s-manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: attendo-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

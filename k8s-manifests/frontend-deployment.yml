apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: attendo-ns
  labels:
    app: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend-pod
          image: ghcr.io/samarthlambture/attendo-frontend:f540997f08b8090ba4e6bb01982038d4371c1236
          ports:
            - containerPort: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: attendo-ns
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-pod
          image: ghcr.io/samarthlambture/attendo-backend:f540997f08b8090ba4e6bb01982038d4371c1236
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: config
            - secretRef:
                name: secret
